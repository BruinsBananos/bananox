<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle • Banano Jungle</title>
  <style>
    body, html { margin:0; padding:0; overflow:hidden; background:#000000; height:100%; cursor:none; }
    #vanta { position:absolute; width:100%; height:100%; }
    .center-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(190, 245, 116, 0.12);
      font-size: 13vw;
      font-weight: 900;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 80px #facc15;
      animation: pulse 8s infinite ease-in-out;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.08; }
      50% { opacity: 0.25; }
    }
    .hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(190, 245, 116, 0.3);
      font-size: 13px;
      letter-spacing: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <div id="vanta"></div>
  
  <div class="center-text">🍌</div>
  <div class="hint">click or press any key to return</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@0.5.24/dist/vanta.net.min.js"></script>
  <script>
    VANTA.NET({
      el: "#vanta",
      mouseControls: true,
      touchControls: true,
      gyroControls: false,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0xbef574,        // lime glow
      backgroundColor: 0x000000,
      points: 8.00,
      maxDistance: 18.00,
      spacing: 14.00,
      showDots: false
    });

    // Click or any key → go back to home
    document.addEventListener('click', () => window.location.href = 'index.html');
    document.addEventListener('keydown', () => window.location.href = 'index.html');
  </script>
</body>
</html>
