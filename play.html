<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play • Banana Tower</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: linear-gradient(#0a1f14, #000); overflow: hidden; }
    .glow { text-shadow: 0 0 40px #facc15; }
    canvas { border: 12px solid #facc15; border-radius: 24px; box-shadow: 0 0 80px #eab308; }
  </style>
</head>
<body class="text-lime-100 min-h-screen">
  <nav class="fixed top-0 w-full bg-black/70 backdrop-blur-xl z-50 border-b border-yellow-400/20">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3 text-4xl font-black tracking-tighter glow">🍌 BANANO JUNGLE</a>
      <div class="flex gap-9 text-lg font-medium">
        <a href="play.html" class="text-yellow-400">Play</a>
        <a href="facts.html" class="hover:text-yellow-400 transition">Facts</a>
        <a href="ecosystem.html" class="hover:text-yellow-400 transition">Ecosystem</a>
        <a href="faucets.html" class="hover:text-yellow-400 transition">Faucets</a>
        <a href="community.html" class="hover:text-yellow-400 transition">Community</a>
      </div>
    </div>
  </nav>

  <div class="pt-24 flex items-center justify-center min-h-screen">
    <div class="text-center relative">
      <h1 class="text-7xl font-black glow mb-4">BANANA TOWER</h1>
      <p class="text-2xl text-lime-300 mb-8">Midnight Potassium Climb 🐒🍌</p>
      <canvas id="c" width="520" height="680" class="mx-auto"></canvas>
      
      <div id="start" class="absolute inset-0 flex items-center justify-center bg-black/80 rounded-[20px]">
        <div class="text-center">
          <p class="text-5xl font-black glow mb-6">TAP or SPACE to START</p>
          <p class="text-xl">Perfect landings = combo ×2, ×3, ×4...</p>
        </div>
      </div>
      <div id="over" class="hidden absolute inset-0 flex items-center justify-center bg-black/90 rounded-[20px]">
        <div class="text-center">
          <p class="text-6xl font-black text-red-400 mb-4">YOU FELL!</p>
          <p class="text-4xl">Height: <span id="fh" class="text-yellow-400">0</span>m</p>
          <p class="text-3xl mb-8">Best: <span id="best" class="text-yellow-400">0</span>m</p>
          <button onclick="start()" class="px-16 py-6 bg-yellow-400 text-black font-bold text-3xl rounded-3xl hover:scale-105">CLIMB AGAIN</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    let p = {x:240, y:400, vx:0, vy:0, w:48, h:52};
    let plats = [], coins = [], peels = [], parts = [];
    let cam = 0, score = 0, best = localStorage.getItem('bt')||0, combo = 1, running = false;
    let keys = {};

    function newPlat(y) {
      let w = Math.max(120, 360 - Math.abs(y)/20);
      return {x: 40 + Math.random()*(520-w-80), y, w};
    }

    function reset() {
      plats = []; coins = []; peels = []; parts = [];
      for (let i = 0; i < 15; i++) plats.push(newPlat(620 - i*65));
      p.x = 240; p.y = 380; p.vy = -18;
      cam = 0; score = 0; combo = 1;
    }

    function start() {
      document.getElementById('start').style.display = 'none';
      document.getElementById('over').classList.add('hidden');
      reset();
      running = true;
    }

    function update() {
      if (!running) return;
      if (keys['ArrowLeft'] || keys['a']) p.vx -= 1.5;
      if (keys['ArrowRight'] || keys['d']) p.vx += 1.5;
      p.vx *= 0.85;
      p.x += p.vx;
      p.vy += 0.75;
      p.y += p.vy;

      if (p.x < 10) { p.x = 10; p.vx = 7; }
      if (p.x > 460) { p.x = 460; p.vx = -7; }

      // landing
      for (let pl of plats) {
        if (p.vy > 0 && p.x + p.w > pl.x && p.x < pl.x + pl.w && p.y + p.h > pl.y && p.y + p.h - p.vy <= pl.y) {
          const center = Math.abs((p.x + 24) - (pl.x + pl.w/2));
          p.y = pl.y - p.h;
          p.vy = -20 - (center < 40 ? 5 : 0);
          combo = center < 40 ? Math.min(combo+1, 10) : 1;
          break;
        }
      }

      // coins
      for (let i=coins.length-1; i>=0; i--) {
        let co = coins[i];
        if (Math.hypot(co.x - (p.x+24), co.y - (p.y+26)) < 35) {
          score += 150 * combo;
          coins.splice(i,1);
        }
      }

      // camera
      if (p.y < 260) {
        let d = 260 - p.y;
        cam += d;
        p.y = 260;
        score += Math.floor(d*0.4);
      }

      // spawn
      while (plats[plats.length-1].y > cam - 900) {
        let ny = plats[plats.length-1].y - 65;
        plats.push(newPlat(ny));
        if (Math.random()<0.5) coins.push({x: plats[plats.length-1].x + 40 + Math.random()*(plats[plats.length-1].w-80), y:ny-40});
      }

      if (p.y > cam + 750) {
        running = false;
        document.getElementById('over').classList.remove('hidden');
        let h = Math.floor(cam / 7);
        document.getElementById('fh').textContent = h;
        let nb = Math.max(best, h);
        document.getElementById('best').textContent = nb;
        if (nb > best) { best = nb; localStorage.setItem('bt', best); }
      }
    }

    function draw() {
      ctx.fillStyle = '#052e16';
      ctx.fillRect(0,0,520,680);

      // vines
      ctx.font = '50px sans-serif';
      ctx.fillStyle = '#166534';
      for (let i=0; i<7; i++) ctx.fillText('🌿', 50 + i*70, ((cam*0.3)%250) + i*120 - 100);

      // platforms
      ctx.font = '42px sans-serif';
      for (let pl of plats) {
        let sy = pl.y - cam;
        ctx.fillStyle = '#facc15';
        ctx.fillText('🍌🍌🍌', pl.x - 15, sy + 32);
      }

      // coins
      ctx.font = '30px sans-serif';
      for (let co of coins) {
        ctx.fillStyle = '#eab308';
        ctx.fillText('🪙', co.x, co.y - cam);
      }

      // monkey
      ctx.font = '65px sans-serif';
      ctx.fillStyle = '#bef574';
      ctx.fillText('🐒', p.x - 8, p.y + 48);

      // UI
      ctx.fillStyle = '#facc15';
      ctx.font = '20px monospace';
      ctx.fillText('HEIGHT ' + Math.floor(cam/7) + 'm', 20, 40);
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);
    c.addEventListener('click', () => { if (running) p.vy = -19; else start(); });
    c.addEventListener('touchstart', e => { e.preventDefault(); if (running) p.vy = -19; else start(); });

    reset();
    loop();
    document.getElementById('start').style.display = 'flex';
  </script>
</body>
</html>
