<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Play · Catch Bananas · Banano X</title>
  <meta name="description" content="Catch falling bananas. A simple Banano mini-game.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Game-only tweaks so the canvas controls stay rock solid */
    .game-frame {
      width: min(100%, 340px);
      aspect-ratio: 340 / 460;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      cursor: none;
    }
    .game-frame canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #071a11;
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">
        <span class="logo-icon" aria-hidden="true">🍌</span>
        <span>BANANO X</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="play.html" class="active">Play</a></li>
        <li><a href="facts.html">Facts</a></li>
        <li><a href="ecosystem.html">Ecosystem</a></li>
        <li><a href="faucets.html">Faucets</a></li>
        <li><a href="community.html">Community</a></li>
      </ul>
    </div>
  </header>

  <main class="play-wrap">
    <div class="play-header">
      <h1>Catch Bananas</h1>
      <p>Move under them. Catch as many as you can.</p>
    </div>

    <div class="game-frame" id="frame">
      <canvas id="c" width="340" height="460" aria-label="Catch Bananas game"></canvas>

      <div id="start" class="game-overlay">
        <div>
          <h2>Catch Bananas 🍌</h2>
          <p style="margin-bottom: 1.25rem;">
            Slide under falling bananas.<br>
            Miss 3 times and you’re out.
          </p>
          <button type="button" class="btn btn-primary" id="startBtn">Play</button>
        </div>
      </div>

      <div id="over" class="game-overlay hidden">
        <div>
          <h2 class="fail-title">Game over</h2>
          <p class="stat">Score: <em id="endScore">0</em> · Best: <em id="endBest">0</em></p>
          <button type="button" class="btn btn-primary" id="retryBtn">Play again</button>
        </div>
      </div>
    </div>

    <p class="play-hint">Mouse or finger to move · ← → or A D · Space to start</p>
  </main>

  <script src="site.js"></script>
  <script>
    (function () {
      "use strict";

      var canvas = document.getElementById("c");
      var ctx = canvas.getContext("2d");
      var W = 340;
      var H = 460;

      var startScreen = document.getElementById("start");
      var overScreen = document.getElementById("over");
      var endScore = document.getElementById("endScore");
      var endBest = document.getElementById("endBest");
      var startBtn = document.getElementById("startBtn");
      var retryBtn = document.getElementById("retryBtn");

      var BEST_KEY = "bx-catch-best-v1";
      var best = parseInt(localStorage.getItem(BEST_KEY) || "0", 10) || 0;

      // Player basket / monkey
      var playerX = W / 2;
      var playerY = H - 50;
      var playerHalf = 36;

      var bananas = [];
      var score = 0;
      var lives = 3;
      var running = false;
      var spawnIn = 0;
      var timeAlive = 0;
      var lastTs = 0;
      var keyL = false;
      var keyR = false;
      var aimX = null; // pointer aim in canvas coords

      function show(el) { el.classList.remove("hidden"); }
      function hide(el) { el.classList.add("hidden"); }

      function toCanvasX(clientX) {
        var rect = canvas.getBoundingClientRect();
        return ((clientX - rect.left) / rect.width) * W;
      }

      function clamp(v, a, b) {
        return Math.max(a, Math.min(b, v));
      }

      function reset() {
        bananas = [];
        score = 0;
        lives = 3;
        playerX = W / 2;
        spawnIn = 0.4;
        timeAlive = 0;
        lastTs = 0;
        aimX = null;
      }

      function start() {
        reset();
        hide(startScreen);
        hide(overScreen);
        running = true;
      }

      function gameOver() {
        running = false;
        if (score > best) {
          best = score;
          localStorage.setItem(BEST_KEY, String(best));
        }
        endScore.textContent = String(score);
        endBest.textContent = String(best);
        show(overScreen);
      }

      function spawn() {
        bananas.push({
          x: 24 + Math.random() * (W - 48),
          y: -24,
          speed: 120 + Math.random() * 40 + Math.min(timeAlive * 10, 160),
          size: 28
        });
      }

      function update(dt) {
        timeAlive += dt;

        // Move player
        if (aimX !== null) {
          // Smooth follow pointer
          playerX += (aimX - playerX) * Math.min(1, dt * 16);
        } else {
          var speed = 320;
          if (keyL) playerX -= speed * dt;
          if (keyR) playerX += speed * dt;
        }
        playerX = clamp(playerX, playerHalf, W - playerHalf);

        // Spawn
        spawnIn -= dt;
        if (spawnIn <= 0) {
          spawn();
          // Faster spawns as you play longer, floor at 0.35s
          spawnIn = Math.max(0.35, 0.95 - timeAlive * 0.025);
        }

        // Bananas
        for (var i = bananas.length - 1; i >= 0; i--) {
          var b = bananas[i];
          b.y += b.speed * dt;

          // Catch zone: wide rectangle around monkey hands
          var dx = Math.abs(b.x - playerX);
          var dy = Math.abs(b.y - playerY);
          var caught = dx < playerHalf + 8 && dy < 34 && b.y > playerY - 40;

          if (caught) {
            score += 1;
            bananas.splice(i, 1);
            continue;
          }

          if (b.y > H + 20) {
            bananas.splice(i, 1);
            lives -= 1;
            if (lives <= 0) {
              gameOver();
              return;
            }
          }
        }
      }

      function draw() {
        // Background
        var g = ctx.createLinearGradient(0, 0, 0, H);
        g.addColorStop(0, "#052012");
        g.addColorStop(1, "#0a2a18");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);

        // Ground
        ctx.fillStyle = "rgba(245, 208, 65, 0.07)";
        ctx.fillRect(0, H - 64, W, 64);
        ctx.strokeStyle = "rgba(245, 208, 65, 0.2)";
        ctx.beginPath();
        ctx.moveTo(0, H - 64);
        ctx.lineTo(W, H - 64);
        ctx.stroke();

        // Bananas
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "32px serif";
        for (var i = 0; i < bananas.length; i++) {
          var b = bananas[i];
          ctx.fillText("🍌", b.x, b.y);
        }

        // Monkey (only while playing — overlays cover the menu)
        if (running) {
          ctx.font = "48px serif";
          ctx.fillText("🐒", playerX, playerY);
        }

        // HUD bar
        ctx.fillStyle = "rgba(0, 0, 0, 0.45)";
        ctx.beginPath();
        if (ctx.roundRect) {
          ctx.roundRect(8, 8, W - 16, 40, 10);
        } else {
          ctx.rect(8, 8, W - 16, 40);
        }
        ctx.fill();

        ctx.fillStyle = "#f5d041";
        ctx.font = "600 15px 'DM Sans', system-ui, sans-serif";
        ctx.textAlign = "left";
        ctx.textBaseline = "middle";
        ctx.fillText("Score  " + score, 20, 28);

        ctx.textAlign = "right";
        var hearts = "";
        for (var h = 0; h < lives; h++) hearts += "💛";
        ctx.font = "18px serif";
        ctx.fillText(hearts || "", W - 18, 28);
      }

      function loop(ts) {
        if (!lastTs) lastTs = ts;
        var dt = (ts - lastTs) / 1000;
        lastTs = ts;
        if (dt > 0.05) dt = 0.05; // tab-switch safety

        if (running) update(dt);
        draw();
        requestAnimationFrame(loop);
      }

      // --- Input ---
      function setAimFromEvent(e) {
        var x = e.clientX;
        if (e.touches && e.touches[0]) x = e.touches[0].clientX;
        if (e.changedTouches && e.changedTouches[0]) x = e.changedTouches[0].clientX;
        aimX = toCanvasX(x);
      }

      canvas.addEventListener("mousemove", function (e) {
        if (!running) return;
        setAimFromEvent(e);
      });

      canvas.addEventListener("mousedown", function (e) {
        if (!running) {
          start();
          return;
        }
        setAimFromEvent(e);
      });

      canvas.addEventListener("mouseleave", function () {
        aimX = null;
      });

      canvas.addEventListener("touchstart", function (e) {
        e.preventDefault();
        if (!running) {
          start();
          return;
        }
        setAimFromEvent(e);
      }, { passive: false });

      canvas.addEventListener("touchmove", function (e) {
        e.preventDefault();
        if (!running) return;
        setAimFromEvent(e);
      }, { passive: false });

      window.addEventListener("keydown", function (e) {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
          keyL = true;
          aimX = null;
          e.preventDefault();
        }
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
          keyR = true;
          aimX = null;
          e.preventDefault();
        }
        if (e.code === "Space" || e.key === " ") {
          e.preventDefault();
          if (!running) start();
        }
      });

      window.addEventListener("keyup", function (e) {
        if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keyL = false;
        if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keyR = false;
      });

      startBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        start();
      });
      retryBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        start();
      });

      // Kick off render loop (menu + game share one loop)
      requestAnimationFrame(loop);
    })();
  </script>
</body>
</html>
