<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Play • Banano Jungle</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: linear-gradient(#0a1f14, #000000); }
    .glow { text-shadow: 0 0 30px #facc15; }
    canvas { border: 12px solid #facc15; border-radius: 24px; box-shadow: 0 0 60px #eab308; }
  </style>
</head>
<body class="text-lime-100 min-h-screen">
  <nav class="fixed top-0 w-full bg-black/70 backdrop-blur-xl z-50 border-b border-yellow-400/20">
    <div class="max-w-6xl mx-auto px-6 py-5 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-3 text-4xl font-black tracking-tighter glow">🍌 BANANO JUNGLE</a>
      <div class="flex gap-9 text-lg font-medium">
        <a href="play.html" class="text-yellow-400">Play</a>
        <a href="facts.html" class="hover:text-yellow-400 transition">Facts</a>
        <a href="ecosystem.html" class="hover:text-yellow-400 transition">Ecosystem</a>
        <a href="faucets.html" class="hover:text-yellow-400 transition">Faucets</a>
        <a href="community.html" class="hover:text-yellow-400 transition">Community</a>
      </div>
    </div>
  </nav>

  <div class="pt-32 px-6 text-center max-w-4xl mx-auto">
    <h1 class="text-7xl font-black glow mb-6">Flappy Monkey Midnight Run 🐒🍌</h1>
    <p class="text-2xl mb-8">Tap / Space / Click to flap • Collect glowing Ban coins • Dodge peels • Night high scores saved</p>
    <canvas id="game" width="520" height="680" class="mx-auto"></canvas>
    <div class="mt-8 flex justify-center gap-12 text-2xl">
      <div>Score: <span id="score" class="text-yellow-400 font-mono">0</span></div>
      <div>High: <span id="high" class="text-yellow-400 font-mono">0</span></div>
      <div>Lives: <span id="lives" class="text-red-400">❤️❤️❤️</span></div>
    </div>
    <button onclick="startGame()" class="mt-8 px-14 py-6 bg-yellow-400 text-black font-bold text-3xl rounded-3xl hover:scale-105 transition">START / RESTART</button>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let x = 180, y = 300, vy = 0, score = 0, lives = 3, high = localStorage.getItem('bjHigh') || 0, running = false;
    let peels = [], coins = [];
    document.getElementById('high').textContent = high;

    function draw() {
      ctx.fillStyle = '#052e16';
      ctx.fillRect(0, 0, 520, 680);
      ctx.font = '72px sans-serif';
      ctx.fillText('🐒', x, y + 20);
      ctx.fillStyle = '#facc15';
      peels.forEach((p, i) => { ctx.fillText('🍌', p.x, p.y); p.y += 8; if (p.y > 720) peels.splice(i, 1); });
      ctx.fillStyle = '#eab308';
      coins.forEach((c, i) => { ctx.fillText('🪙', c.x, c.y); c.y += 7; if (c.y > 720) coins.splice(i, 1); });

      peels.forEach((p, i) => { if (Math.hypot(p.x - x, p.y - y) < 45) { lives--; peels.splice(i, 1); } });
      coins.forEach((c, i) => { if (Math.hypot(c.x - x, c.y - y) < 40) { score += 25; coins.splice(i, 1); } });

      document.getElementById('score').textContent = score;
      document.getElementById('lives').innerHTML = '❤️'.repeat(Math.max(0, lives));
      if (score > high) { high = score; localStorage.setItem('bjHigh', high); document.getElementById('high').textContent = high; }
      if (lives <= 0) running = false;
      if (running) requestAnimationFrame(draw);
    }

    function spawn() {
      if (!running) return;
      if (Math.random() < 0.75) peels.push({x: Math.random() * 380 + 60, y: -40});
      if (Math.random() < 0.65) coins.push({x: Math.random() * 380 + 60, y: -40});
      setTimeout(spawn, 280);
    }

    function startGame() {
      x = 180; y = 300; vy = 0; score = 0; lives = 3; peels = []; coins = []; running = true;
      document.getElementById('score').textContent = '0';
      draw(); spawn();
    }

    document.addEventListener('keydown', e => {
      if ((e.key === ' ' || e.key === 'Spacebar') && running) vy = -16;
      if (e.key === 'ArrowLeft' || e.key === 'a') x = Math.max(30, x - 28);
      if (e.key === 'ArrowRight' || e.key === 'd') x = Math.min(420, x + 28);
    });
    canvas.addEventListener('click', () => { if (running) vy = -16; else startGame(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); if (running) vy = -16; else startGame(); });

    setInterval(() => { if (running) { vy += 0.85; y += vy; if (y > 590) { y = 590; vy = 0; } if (y < 40) { y = 40; vy = 3; } } }, 16);
  </script>
</body>
</html>
